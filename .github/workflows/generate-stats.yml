name: Generate Stats Images

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone jstrieb/github-stats
        run: git clone https://github.com/jstrieb/github-stats.git stats-tool

      - name: Install requirements
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r stats-tool/requirements.txt

      - name: Generate images
        working-directory: stats-tool
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: python3 generate_images.py

      - name: Copy generated to repo
        run: |
          mkdir -p generated
          cp stats-tool/generated/*.svg generated/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated
          git diff --staged --quiet || (git commit -m "chore: update stats [skip ci]" && git push)
